<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Pepe</title>

  <style>
    body {
      margin: 0;
      padding: 12px;
      width: 280px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    a {
      color: #222;
      text-decoration: none;
    }

    .support-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      margin-bottom: 8px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      cursor: pointer;
    }

    .support-btn:hover {
      background: #e8e8e8;
    }

    .support-btn .text {
      font-size: 14px;
      font-weight: 500;
    }

    .support-btn img {
      width: 24px;
      height: 24px;
    }

    .pepe-link {
      display: block;
      text-align: center;
      color: #1976d2;
      font-size: 12px;
      font-family: monospace;
      padding: 8px;
      margin-top: 4px;
    }

    .pepe-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <a href="#" class="support-btn" target="_blank" id="openBtn">
    <span class="text">Open in Pepe Silv.AI</span>
    <img src="export-share-icon.svg" alt="Share" />
  </a>

  <a href="https://buymeacoffee.com/jakeparkersusername" class="support-btn" target="_blank">
    <span class="text">Buy me a coffee</span>
    <img src="bmc-logo-no-background.png" alt="Coffee" />
  </a>

  <a href="https://patreon.com/JakeParkersUsername" class="support-btn" target="_blank">
    <span class="text">Support me on Patreon</span>
    <img src="PATREON_SYMBOL_1_BLACK_RGB.svg" alt="Patreon" />
  </a>

  <a href="https://pepesilv.ai" class="pepe-link" target="_blank">pepesilv.ai</a>

  <script src="popup.js"></script>
</body>
</html>
